name: Chorus
options:
  bundleIdPrefix: com.nicojan
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    majorVersion: 2.9.3

targets:
  Chorus:
    type: application
    platform: macOS
    sources:
      - path: Chorus
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Chorus/Resources/ServiceCatalog.json
      - path: Chorus/Resources/hagezi-light.json
      - path: Chorus/Resources/fanboy-annoyance.json
      - path: Chorus/Resources/darkreader.js
      - path: Chorus/Resources/NotificationScripts
        optional: true
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicojan.Chorus
        PRODUCT_NAME: Chorus
        MARKETING_VERSION: "1.5.12"
        CURRENT_PROJECT_VERSION: "21"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Chorus/Info.plist
        CODE_SIGN_ENTITLEMENTS: Chorus/Chorus.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Chorus forwards notifications from your web services to macOS."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.social-networking"
      configs:
        # Debug builds run under a separate bundle id so a copy launched from
        # Xcode can never share the installed release app's data. The bundle id
        # keys WebKit storage, Preferences, Caches and notifications; the
        # SwiftData store is moved separately in AppState.init (its default path
        # is not bundle-scoped). See fix/isolate-debug-data.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.nicojan.Chorus.debug
        # Only the Release build (used by Archive) needs the Developer ID team.
        # Keeping it out of Debug lets the app sign ad-hoc so it and the ad-hoc
        # xctest bundle share a Team ID; a real team on only the host trips
        # dyld's Team ID check and unit tests fail to load.
        Release:
          DEVELOPMENT_TEAM: "3CY4DX3K45"
    scheme:
      testTargets:
        - ChorusTests

  ChorusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ChorusTests
    dependencies:
      - target: Chorus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicojan.ChorusTests
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Required so the test bundle can be code-signed; without an explicit
        # Info.plist this generates one. (Some XcodeGen versions add it by
        # default and some don't, so set it explicitly.)
        GENERATE_INFOPLIST_FILE: true
